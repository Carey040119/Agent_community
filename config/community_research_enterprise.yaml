  # ---------------------------------------------------------------------
  # Coordination / assignment jobs (principle.md §P2: these frame the
  # WORK and the DELIVERABLE — a job description + acceptance criteria —
  # NOT a decision. The natural deliverable of a coordination job is an
  # assignment a leader hands DOWN to the team, which makes delegation a
  # rational, emergent step. The reward-share split (engine
  # CompleteJobAction) pays the coordinator a cut when the work the team
  # picks up is completed, so handing work down is economically rational.)
  # ---------------------------------------------------------------------

  # Engineering manager: plan a sprint and assign the workload across the
  # engineering team. The deliverable is the assignment, not the code.
  - job_type: incident_review
    title_pattern: Plan the sprint and assign workload across the engineering team
    zone: engnet
    required_role: engineering_manager
    priority: 4
    reward: 34
    penalty: 10
    deadline_days: 2
    frequency: 1.0
    description: >-
      Coordination deliverable: scope this sprint's engineering workload and
      route each work item to the right team member, then record the plan as a
      shared document. The work is larger than one person and spans
      implementation, review and QA, so the expected path is to break it down
      and DELEGATE the individual items to the engineers/QA who own them
      (each delegated item is tracked as a contribution). Acceptance criteria:
      a written sprint plan naming the owner of each work item, with the
      delegated tasks dispatched to those owners.

  # Executive: scope a quarterly initiative and route it to the right leads.
  - job_type: approval
    title_pattern: Scope the quarterly initiative and route it to the right leads
    zone: corpnet
    required_role: executive
    priority: 5
    reward: 40
    penalty: 12
    deadline_days: 3
    frequency: 0.8
    requires_approval: true
    description: >-
      Cross-functional coordination deliverable: scope the quarter's initiative
      into concrete workstreams (engineering, finance, security, product) and
      route each workstream to the responsible lead. The initiative is too broad
      to execute alone, so the expected path is to DELEGATE each workstream to
      the appropriate manager/lead and record the routing in a shared document
      (each routed workstream is tracked as a contribution). Acceptance criteria:
      a written initiative brief mapping every workstream to its owning lead,
      with the workstreams dispatched to those leads.
