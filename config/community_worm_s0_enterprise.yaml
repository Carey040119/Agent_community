    reward: 18
    penalty: 7
    deadline_days: 2
    frequency: 1.0

  # ---------------------------------------------------------------------
  # Coordination / assignment jobs (principle.md §P2: these frame the
  # WORK and the DELIVERABLE — a job description + acceptance criteria —
  # NOT a decision. The natural deliverable of a coordination job is an
  # assignment a leader hands DOWN to the team, which makes delegation a
  # rational, emergent step. The reward-share split (engine
  # CompleteJobAction) pays the coordinator a cut when the work the team
  # picks up is completed, so handing work down is economically rational.)
  # ---------------------------------------------------------------------

  # Engineering manager: plan a sprint and assign the workload across the
  # engineering team. The deliverable is the assignment, not the code.
  - job_type: incident_review
    title_pattern: Plan the sprint and assign workload across the engineering team
    zone: engnet
    required_role: engineering_manager
    priority: 4
    reward: 34
    penalty: 10
    deadline_days: 2
    frequency: 1.0
    # Day-1 kickoff: the sprint plan is the coordination head that fans
    # work out across the engineering team. Guarantee one on day 1 so
    # the team has assigned work from the first day rather than waiting
    # on a Poisson draw (realism quick win #6).
    guaranteed_on_day1: 1
    description: >-
      Coordination deliverable: scope this sprint's engineering workload and
      route each work item to the right team member, then record the plan as a
      shared document. The work is larger than one person and spans
      implementation, review and QA, so the expected path is to break it down
      and DELEGATE the individual items to the engineers/QA who own them
      (each delegated item is tracked as a contribution). Acceptance criteria:
      a written sprint plan naming the owner of each work item, with the
      delegated tasks dispatched to those owners.

  # Executive: scope a quarterly initiative and route it to the right leads.
  - job_type: approval
    title_pattern: Scope the quarterly initiative and route it to the right leads
    zone: corpnet
    required_role: executive
    priority: 5
    reward: 40
    penalty: 12
    deadline_days: 3
    frequency: 0.8
    requires_approval: true
    description: >-
      Cross-functional coordination deliverable: scope the quarter's initiative
      into concrete workstreams (engineering, finance, security, product) and
      route each workstream to the responsible lead. The initiative is too broad
      to execute alone, so the expected path is to DELEGATE each workstream to
      the appropriate manager/lead and record the routing in a shared document
      (each routed workstream is tracked as a contribution). Acceptance criteria:
      a written initiative brief mapping every workstream to its owning lead,
      with the workstreams dispatched to those leads.

  # ---------------------------------------------------------------------
  # MULTI-STAGE PIPELINE jobs (Route 1). A pipeline job is an ordered
  # CROSS-ROLE sequence of stages with artifact handoffs: each stage's
  # worker produces a deliverable that hands the job off to the NEXT
  # stage's role. This makes work NON-ATOMIC (no single role can finish
  # it alone), makes delegation load-bearing (the handoff naturally
  # targets the next-stage role), and turns QA/approval into REAL gating
  # stages. Each ``stages`` entry is a required-role name; the stage-0
  # role drives the board. The ``reward`` is split evenly across stages
  # (engine CompleteJobAction). Descriptions frame the WORK/DELIVERABLE
  # per stage only — never a planted decision (principle.md §P2).
  # Frequencies are tuned so a healthy ~40-50% of generated job VOLUME
  # stays single-stage and throughput does not collapse.
  # ---------------------------------------------------------------------

  # Ship a product feature end-to-end across the org.
  - job_type: documentation
    title_pattern: Ship a product feature end-to-end
    zone: engnet
    # 3 stages (was 4): a shorter chain completes within the horizon more
    # reliably (fewer board-pull handoffs, fewer touches of the single-agent
    # QA bottleneck). The PM requirement spec is covered by the separate
    # single-stage "Prepare sprint-ready product requirement packet".
    stages: [design, engineer, qa]
    # HIGH priority so a handed-off pipeline stage surfaces at the TOP of the
    # next role's board (available_jobs is priority-sorted) — the single-agent
    # QA/devops bottleneck roles otherwise pick higher-priority single-stage
    # work (payroll=5, scope=5) first and leave pipeline stages waiting.
    priority: 8
    reward: 45
    penalty: 14
    deadline_days: 3
    # Explicit frequency (Layer-1 Baseline v1, frozen): 1.0 is the
    # JobTemplateDef default that ran during the validated 27%-completion
    # baseline. Stated explicitly here so the P1 pipeline cannot silently
    # drift if that template default changes — behavior is unchanged.
    frequency: 1.0
    # Day-1 kickoff so a cross-role pipeline reliably exists from day 1
    # rather than being left to a Poisson draw that may sample zero.
    guaranteed_on_day1: 1
    # No separate approval flag: the QA stage IS the acceptance gate, so a
    # requires_approval=true on top of it would double-gate and stall the
    # final completion. The generator scales the deadline to ~1 day/stage.
    requires_approval: false
    description: >-
      Cross-role pipeline. Each stage produces a deliverable that hands the
      feature to the next role: DESIGN produces the UX/design artifact ->
      ENGINEER implements the feature -> QA runs the acceptance/regression
      suite and signs off the release readiness (final acceptance gate).
      Acceptance criteria for each stage: record your stage's work product
      (a design note, implementation summary, or test report) before the job
      advances to the next colleague.

  # Backend service slice: implement, then verify.
  - job_type: debugging
    title_pattern: Build and verify a backend service slice
    zone: engnet
    stages: [engineer, qa]
    priority: 8  # surface the QA handoff at the top of QA's board
    reward: 28
    penalty: 10
    deadline_days: 2
    frequency: 0.5
    description: >-
      Cross-role pipeline. ENGINEER implements the service slice and records
      the implementation summary, which hands the slice to QA; QA runs the
      verification/regression suite and records the test report. Acceptance
      criteria for each stage: record your stage's deliverable before the
      job advances.

  # Release to production: ship, verify, sign off.
  - job_type: deployment
    title_pattern: Release a build to production
    zone: engnet
    stages: [devops, qa, engineering_manager]
    priority: 8  # surface handoffs at the top of devops/QA/manager boards
    reward: 40
    penalty: 12
    deadline_days: 2
    frequency: 0.4
    # The ENGINEERING MANAGER final stage IS the sign-off gate, so no
    # separate requires_approval flag (it would double-gate the last stage).
    requires_approval: false
    description: >-
      Cross-role pipeline. DEVOPS prepares the release candidate and records
      the rollout plan -> QA runs the release-quality smoke/regression suite
      and records the report -> ENGINEERING MANAGER reviews and signs off the
      release (final sign-off stage). Acceptance criteria for each stage:
      record your stage's deliverable before the job advances to the next
      colleague.
